<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访客预约</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>访客预约申请 <span class="tag">Demo</span></h1>
      <p id="debugVersion" class="version-debug">版本: 加载中...</p>
      <div class="actions" style="margin-bottom: 12px">
        <a class="btn-link" href="./query">查询预约状态</a>
      </div>
      <div class="card">
        <p>字段由后台管理员动态配置。</p>
        <p class="hint">上传文件支持 pdf/jpg/jpeg/png，大小不超过 5MB。</p>
        <form id="visitorForm" class="row"></form>
        <div class="actions" style="margin-top: 12px">
          <button id="submitBtn" type="button">提交申请</button>
        </div>
        <p id="msg"></p>
        <div id="receipt" class="receipt hidden"></div>
      </div>
    </div>

    <div id="noticeModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="noticeModalTitle">
        <h2 id="noticeModalTitle">来访须知</h2>
        <div id="noticeModalContent" class="notice-content">加载中...</div>
        <div class="actions" style="margin-top: 12px">
          <button id="noticeModalClose" type="button">我已阅读</button>
        </div>
      </div>
    </div>

    <script type="module" src="./visitor.js"></script>
  </body>
</html>
