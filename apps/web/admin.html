<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员端</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>后台管理员端 <span class="tag">Demo</span></h1>
      <p id="debugVersion" class="version-debug">版本: 加载中...</p>
      <div class="nav">
        <button id="tabFields">字段配置</button>
        <button id="tabList" class="active">申请列表</button>
        <button id="tabCalendar">日历视图</button>
        <button id="tabNotice">须知配置</button>
      </div>

      <section id="panelFields" class="card hidden">
        <h2 id="fieldFormTitle">新增字段</h2>
        <div class="row two">
          <div>
            <label>字段 key</label>
            <input id="fKey" placeholder="例如 company_name" />
          </div>
          <div>
            <label>字段名称</label>
            <input id="fLabel" placeholder="例如 公司名称" />
          </div>
          <div>
            <label>类型</label>
            <select id="fType">
              <option value="text">文字填空</option>
              <option value="number">数字</option>
              <option value="select">选择</option>
              <option value="file">文件上传</option>
            </select>
          </div>
          <div>
            <label>是否必填</label>
            <select id="fRequired">
              <option value="true">是</option>
              <option value="false">否</option>
            </select>
          </div>
        </div>
        <div id="optWrap" style="margin-top: 10px" class="hidden">
          <label>选择项</label>
          <div class="option-editor-row">
            <input id="fOptionInput" placeholder="输入一个选项" />
            <button id="addOptionBtn" class="secondary" type="button">添加</button>
          </div>
          <div id="optionList" class="option-list" style="margin-top: 8px"></div>
        </div>
        <div id="numWrap" style="margin-top: 10px" class="hidden">
          <label>数字范围（可选）</label>
          <div class="row two">
            <div>
              <label>最小值</label>
              <input id="fNumberMin" type="number" placeholder="例如 10" />
            </div>
            <div>
              <label>最大值</label>
              <input id="fNumberMax" type="number" placeholder="例如 50" />
            </div>
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button id="saveFieldBtn" type="button">保存字段</button>
          <button id="cancelEditBtn" class="secondary hidden" type="button">取消编辑</button>
        </div>

        <h2 style="margin-top: 20px">当前字段</h2>
        <div id="fieldRows" class="admin-card-list"></div>
      </section>

      <section id="panelList" class="card">
        <h2>申请列表</h2>
        <div class="row two">
          <div>
            <label>开始日期（按访问时间）</label>
            <div class="date-input-group">
              <button id="openFromDateBtn" class="secondary date-open-btn" type="button">日历</button>
              <input id="qFromDate" type="date" />
            </div>
          </div>
          <div>
            <label>结束日期</label>
            <div class="date-input-group">
              <button id="openToDateBtn" class="secondary date-open-btn" type="button">日历</button>
              <input id="qToDate" type="date" />
            </div>
          </div>
        </div>
        <div class="actions quick-range-row" style="margin-top: 10px">
          <button id="range3dBtn" class="secondary" type="button">三天内</button>
          <button id="range7dBtn" class="secondary" type="button">一周内</button>
          <button id="range30dBtn" class="secondary" type="button">一月内</button>
        </div>
        <div style="margin-top: 10px">
          <label>审批状态</label>
          <select id="qStatus">
            <option value="">全部</option>
            <option value="pending">待审批</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
          </select>
        </div>
        <div style="margin-top: 10px">
          <label>关键词（匹配填写内容或文件名）</label>
          <input id="qKeyword" placeholder="例如 张三 / 会议 / 合同.pdf" />
        </div>
        <div class="actions" style="margin: 10px 0">
          <button id="searchListBtn" type="button">查询</button>
        </div>
        <div id="appRows" class="admin-card-list"></div>
        <div class="actions" style="margin-top: 10px">
          <button id="prevPageBtn" class="secondary" type="button">上一页</button>
          <button id="nextPageBtn" class="secondary" type="button">下一页</button>
          <span id="pageInfo" class="tag">第 1 / 1 页</span>
        </div>
      </section>

      <section id="panelCalendar" class="card hidden">
        <h2>日历视图</h2>
        <p class="hint">已通过审批的日期会高亮，并显示对应单位名称。</p>
        <div class="row two">
          <div class="month-load-col">
            <label>月份 (YYYY-MM)</label>
            <div class="month-load-row">
              <input id="calMonth" />
              <button id="loadCalBtn" type="button">加载日历</button>
            </div>
          </div>
          <div class="month-nav-col">
            <label>月份切换</label>
            <div class="month-nav-row">
              <button id="prevMonthBtn" class="secondary" type="button">上一月</button>
              <button id="nextMonthBtn" class="secondary" type="button">下一月</button>
            </div>
          </div>
        </div>
        <div id="calendar" class="calendar" style="margin-top: 12px"></div>
        <div id="calendarDetails" class="card" style="margin-top: 12px">
          <strong>日期详情</strong>
          <div id="calendarDetailsBody" class="hint">点击有高亮的日期查看单位名称。</div>
        </div>
      </section>

      <section id="panelNotice" class="card hidden">
        <h2>须知配置</h2>
        <p class="hint">以下内容会展示在“须知阅读”页面，默认可为空。</p>
        <label>须知内容</label>
        <textarea id="noticeContentInput" rows="10" placeholder="请输入须知内容，支持换行"></textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="saveNoticeBtn" type="button">保存须知</button>
        </div>
      </section>

      <p id="adminMsg"></p>
    </div>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
